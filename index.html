<!DOCTYPE html>
<html lang="en">
<head>
<title>Coding visualizer</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="menu-bar">
        <h2 style="margin: 0; font-size: 1.2rem;">Coding Visualizer</h2>
        
        <div class="selector-group">
            <label for="algo-select" style="font-weight: bold;">Algorithm:</label>
            <select id="algo-select" style="padding: 5px; border-radius: 4px;">
                <option value="static-huffman">Static Huffman</option>
                <option value="adaptive-huffman">Adaptive Huffman</option>
            </select>
        </div>
    </nav>

    <main id="app-container" style="padding: 20px;">
        </main>

</body>
<script type="module" src="./js/main.js"></script>
</html>
